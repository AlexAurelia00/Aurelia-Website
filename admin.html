<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel | Aurelia Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Assests/Css/stylesheet.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-slate-900 text-gray-200">
    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="bg-slate-800 border-b border-slate-700 p-6">
            <div class="container mx-auto flex justify-between items-center">
                <div class="text-2xl font-bold text-white">
                    Aurelia<span class="text-[#d4af37]">Design</span> Admin
                </div>
                <button id="logoutBtn" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg font-semibold transition">
                    Logout
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 container mx-auto px-6 py-12">
            <!-- Login Section -->
            <div id="loginSection" class="max-w-md mx-auto">
                <div class="bg-slate-800 border border-slate-700 rounded-lg p-8">
                    <h1 class="text-3xl font-bold text-white mb-6">Admin Login</h1>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                            <input type="email" id="adminEmail" class="w-full rounded-lg border border-slate-700 bg-slate-900 px-4 py-3 text-white outline-none focus:border-[#d4af37]" placeholder="admin@example.com">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                            <input type="password" id="adminPassword" class="w-full rounded-lg border border-slate-700 bg-slate-900 px-4 py-3 text-white outline-none focus:border-[#d4af37]" placeholder="••••••••">
                        </div>
                        <button id="loginBtn" class="w-full bg-gradient-to-r from-[#a27b02] via-[#d4af37] to-[#a27b02] text-white px-8 py-3 rounded-full hover:brightness-125 transition-all duration-300 font-bold">
                            Login
                        </button>
                        <div id="loginError" class="hidden p-3 rounded bg-red-900 text-red-200 text-sm"></div>
                    </div>
                </div>
            </div>

            <!-- Dashboard Section -->
            <div id="dashboardSection" class="hidden">
                <div class="mb-8">
                    <h1 class="text-4xl font-bold text-white mb-2">Client Inquiries Dashboard</h1>
                    <p class="text-gray-400">View and manage all client contacts</p>
                </div>

                <!-- Filters and Stats -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="bg-slate-800 border border-slate-700 rounded-lg p-6">
                        <p class="text-gray-400 text-sm">Total Inquiries</p>
                        <p id="totalCount" class="text-3xl font-bold text-[#d4af37] mt-2">0</p>
                    </div>
                    <div class="bg-slate-800 border border-slate-700 rounded-lg p-6">
                        <p class="text-gray-400 text-sm">New</p>
                        <p id="newCount" class="text-3xl font-bold text-green-400 mt-2">0</p>
                    </div>
                    <div class="bg-slate-800 border border-slate-700 rounded-lg p-6">
                        <p class="text-gray-400 text-sm">In Progress</p>
                        <p id="inProgressCount" class="text-3xl font-bold text-yellow-400 mt-2">0</p>
                    </div>
                    <div class="bg-slate-800 border border-slate-700 rounded-lg p-6">
                        <p class="text-gray-400 text-sm">Completed</p>
                        <p id="completedCount" class="text-3xl font-bold text-blue-400 mt-2">0</p>
                    </div>
                </div>

                <!-- Filters -->
                <div class="bg-slate-800 border border-slate-700 rounded-lg p-6 mb-8">
                    <h2 class="text-xl font-bold text-white mb-4">Filters</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">Status</label>
                            <select id="statusFilter" class="w-full rounded-lg border border-slate-700 bg-slate-900 px-4 py-2 text-white outline-none focus:border-[#d4af37]">
                                <option value="">All Status</option>
                                <option value="new">New</option>
                                <option value="in_progress">In Progress</option>
                                <option value="completed">Completed</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">Service</label>
                            <select id="serviceFilter" class="w-full rounded-lg border border-slate-700 bg-slate-900 px-4 py-2 text-white outline-none focus:border-[#d4af37]">
                                <option value="">All Services</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">Search</label>
                            <input type="text" id="searchFilter" class="w-full rounded-lg border border-slate-700 bg-slate-900 px-4 py-2 text-white outline-none focus:border-[#d4af37]" placeholder="Search by name or email">
                        </div>
                    </div>
                </div>

                <!-- Table -->
                <div class="bg-slate-800 border border-slate-700 rounded-lg overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-slate-900 border-b border-slate-700">
                                <tr>
                                    <th class="px-6 py-4 text-left text-sm font-semibold text-gray-300">Name</th>
                                    <th class="px-6 py-4 text-left text-sm font-semibold text-gray-300">Email</th>
                                    <th class="px-6 py-4 text-left text-sm font-semibold text-gray-300">Phone</th>
                                    <th class="px-6 py-4 text-left text-sm font-semibold text-gray-300">Service</th>
                                    <th class="px-6 py-4 text-left text-sm font-semibold text-gray-300">Status</th>
                                    <th class="px-6 py-4 text-left text-sm font-semibold text-gray-300">Submitted</th>
                                    <th class="px-6 py-4 text-left text-sm font-semibold text-gray-300">Completed</th>
                                    <th class="px-6 py-4 text-left text-sm font-semibold text-gray-300">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="inquiriesTable" class="divide-y divide-slate-700">
                                <tr>
                                    <td colspan="7" class="px-6 py-8 text-center text-gray-400">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Detail Modal -->
    <div id="detailModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-slate-900 border-b border-slate-700 px-6 py-4 flex justify-between items-center">
                <h2 class="text-2xl font-bold text-white">Inquiry Details</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            <div id="detailContent" class="p-6 space-y-4">
                <!-- Content will be populated here -->
            </div>
        </div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://aruvntvtxsbguztzjwkz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_YCn4vlof9ULaUt2dUP1fug_47A_j-wZ';

        // Initialize Supabase
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allInquiries = [];
        let isLoggedIn = false;

        // Check if user is logged in
        function checkLoginStatus() {
            const token = localStorage.getItem('adminToken');
            const email = localStorage.getItem('adminEmail');
            
            if (token && email) {
                isLoggedIn = true;
                showDashboard();
            } else {
                showLogin();
            }
        }

        // Show login section
        function showLogin() {
            const loginSection = document.getElementById('loginSection');
            const dashboardSection = document.getElementById('dashboardSection');
            const logoutBtn = document.getElementById('logoutBtn');
            
            if (loginSection) loginSection.classList.remove('hidden');
            if (dashboardSection) dashboardSection.classList.add('hidden');
            if (logoutBtn) logoutBtn.classList.add('hidden');
        }

        // Show dashboard
        function showDashboard() {
            const loginSection = document.getElementById('loginSection');
            const dashboardSection = document.getElementById('dashboardSection');
            const logoutBtn = document.getElementById('logoutBtn');
            
            if (loginSection) loginSection.classList.add('hidden');
            if (dashboardSection) dashboardSection.classList.remove('hidden');
            if (logoutBtn) logoutBtn.classList.remove('hidden');
            loadInquiries();
        }

        // Attach login handler when DOM is ready
        function attachLoginHandler() {
            const loginBtn = document.getElementById('loginBtn');
            
            if (!loginBtn) {
                console.error('Login button not found');
                return;
            }
            
            loginBtn.addEventListener('click', handleLogin);
            
            // Also allow Enter key to submit
            const emailInput = document.getElementById('adminEmail');
            const passwordInput = document.getElementById('adminPassword');
            
            if (emailInput) {
                emailInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') handleLogin();
                });
            }
            if (passwordInput) {
                passwordInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') handleLogin();
                });
            }
        }

        // Login handler function
        function handleLogin() {
            const email = document.getElementById('adminEmail')?.value;
            const password = document.getElementById('adminPassword')?.value;
            const loginError = document.getElementById('loginError');

            console.log('Login attempt with email:', email);

            if (!email || !password) {
                if (loginError) {
                    loginError.classList.remove('hidden');
                    loginError.innerText = 'Please enter email and password';
                }
                return;
            }

            try {
                // For demo purposes, accept a predefined admin credential
                // In production, use proper authentication
                if (email === 'admin@aureliadesign.com' && password === 'admin123') {
                    console.log('Login successful');
                    localStorage.setItem('adminToken', 'demo_token_' + Date.now());
                    localStorage.setItem('adminEmail', email);
                    if (loginError) loginError.classList.add('hidden');
                    isLoggedIn = true;
                    showDashboard();
                } else {
                    console.log('Invalid credentials');
                    if (loginError) {
                        loginError.classList.remove('hidden');
                        loginError.innerText = 'Invalid email or password. Use: admin@aureliadesign.com / admin123';
                    }
                }
            } catch (error) {
                console.error('Login error:', error);
                if (loginError) {
                    loginError.classList.remove('hidden');
                    loginError.innerText = 'Error: ' + error.message;
                }
            }
        }

        // Logout handler
        function attachLogoutHandler() {
            const logoutBtn = document.getElementById('logoutBtn');
            
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    localStorage.removeItem('adminToken');
                    localStorage.removeItem('adminEmail');
                    isLoggedIn = false;
                    showLogin();
                });
            }
        }

        // Load inquiries from Supabase
        async function loadInquiries() {
            try {
                const { data, error } = await supabaseClient
                    .from('client_inquiries')
                    .select('*')
                    .order('submitted_at', { ascending: false });

                if (error) throw error;

                allInquiries = data || [];
                updateStats();
                populateFilters();
                displayInquiries(allInquiries);
            } catch (error) {
                console.error('Error loading inquiries:', error);
                document.getElementById('inquiriesTable').innerHTML = `
                    <tr>
                        <td colspan="7" class="px-6 py-8 text-center text-red-400">
                            Error loading inquiries. Please check your internet connection.
                        </td>
                    </tr>
                `;
            }
        }

        // Update statistics
        function updateStats() {
            const total = allInquiries.length;
            const newCount = allInquiries.filter(i => i.status === 'new').length;
            const inProgress = allInquiries.filter(i => i.status === 'in_progress').length;
            const completed = allInquiries.filter(i => i.status === 'completed').length;

            document.getElementById('totalCount').innerText = total;
            document.getElementById('newCount').innerText = newCount;
            document.getElementById('inProgressCount').innerText = inProgress;
            document.getElementById('completedCount').innerText = completed;
        }

        // Populate filter dropdowns
        function populateFilters() {
            const serviceFilter = document.getElementById('serviceFilter');
            const services = [...new Set(allInquiries.map(i => i.service_needed))];
            
            services.forEach(service => {
                if (service && !serviceFilter.querySelector(`option[value="${service}"]`)) {
                    const option = document.createElement('option');
                    option.value = service;
                    option.innerText = service;
                    serviceFilter.appendChild(option);
                }
            });
        }

        // Display inquiries in table
        function displayInquiries(inquiries) {
            const table = document.getElementById('inquiriesTable');
            
            if (inquiries.length === 0) {
                table.innerHTML = `
                    <tr>
                        <td colspan="7" class="px-6 py-8 text-center text-gray-400">No inquiries found</td>
                    </tr>
                `;
                return;
            }

            table.innerHTML = inquiries.map(inquiry => `
                <tr class="hover:bg-slate-700 transition">
                    <td class="px-6 py-4 text-sm text-white">${inquiry.full_name}</td>
                    <td class="px-6 py-4 text-sm text-gray-400">${inquiry.email}</td>
                    <td class="px-6 py-4 text-sm text-gray-400">${inquiry.phone}</td>
                    <td class="px-6 py-4 text-sm text-gray-400">${inquiry.service_needed}</td>
                    <td class="px-6 py-4 text-sm">
                        <select onchange="updateStatus('${inquiry.id}', this.value)" class="bg-slate-900 border border-slate-600 rounded px-2 py-1 text-sm text-white cursor-pointer">
                            <option value="new" ${inquiry.status === 'new' ? 'selected' : ''}>New</option>
                            <option value="in_progress" ${inquiry.status === 'in_progress' ? 'selected' : ''}>In Progress</option>
                            <option value="completed" ${inquiry.status === 'completed' ? 'selected' : ''}>Completed</option>
                        </select>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-400">${new Date(inquiry.submitted_at).toLocaleDateString()}</td>
                    <td class="px-6 py-4 text-sm text-gray-400">${inquiry.complete_date ? new Date(inquiry.complete_date).toLocaleDateString() : '-'}</td>
                    <td class="px-6 py-4 text-sm">
                        <button onclick="viewDetails('${inquiry.id}')" class="text-[#d4af37] hover:text-[#FDEEBE] font-semibold">View</button>
                        <button onclick="deleteInquiry('${inquiry.id}')" class="text-red-400 hover:text-red-300 font-semibold ml-4">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        // Filter inquiries
        function filterInquiries() {
            const status = document.getElementById('statusFilter').value;
            const service = document.getElementById('serviceFilter').value;
            const search = document.getElementById('searchFilter').value.toLowerCase();

            let filtered = allInquiries;

            if (status) filtered = filtered.filter(i => i.status === status);
            if (service) filtered = filtered.filter(i => i.service_needed === service);
            if (search) {
                filtered = filtered.filter(i =>
                    i.full_name.toLowerCase().includes(search) ||
                    i.email.toLowerCase().includes(search)
                );
            }

            displayInquiries(filtered);
        }

        // Add filter event listeners
        document.getElementById('statusFilter')?.addEventListener('change', filterInquiries);
        document.getElementById('serviceFilter')?.addEventListener('change', filterInquiries);
        document.getElementById('searchFilter')?.addEventListener('keyup', filterInquiries);

        // View inquiry details
        function viewDetails(id) {
            const inquiry = allInquiries.find(i => i.id === id);
            if (!inquiry) return;

            const content = document.getElementById('detailContent');
            content.innerHTML = `
                <div class="space-y-4">
                    <div>
                        <p class="text-gray-400 text-sm">Full Name</p>
                        <p class="text-white font-semibold">${inquiry.full_name}</p>
                    </div>
                    <div>
                        <p class="text-gray-400 text-sm">Email</p>
                        <p class="text-white"><a href="mailto:${inquiry.email}" class="text-[#d4af37] hover:text-[#FDEEBE]">${inquiry.email}</a></p>
                    </div>
                    <div>
                        <p class="text-gray-400 text-sm">Phone</p>
                        <p class="text-white"><a href="tel:${inquiry.phone}" class="text-[#d4af37] hover:text-[#FDEEBE]">${inquiry.phone}</a></p>
                    </div>
                    <div>
                        <p class="text-gray-400 text-sm">Service Needed</p>
                        <p class="text-white">${inquiry.service_needed}</p>
                    </div>
                    <div>
                        <p class="text-gray-400 text-sm">Project Details</p>
                        <p class="text-white">${inquiry.project_details}</p>
                    </div>
                    <div>
                        <p class="text-gray-400 text-sm">Submitted</p>
                        <p class="text-white">${new Date(inquiry.submitted_at).toLocaleString()}</p>
                    </div>
                    <div>
                        <p class="text-gray-400 text-sm">Completed</p>
                        <p class="text-white">${inquiry.complete_date ? new Date(inquiry.complete_date).toLocaleString() : 'Not completed yet'}</p>
                    </div>
                    <div>
                        <p class="text-gray-400 text-sm">Status</p>
                        <select onchange="updateStatus('${inquiry.id}', this.value)" class="bg-slate-900 border border-slate-600 rounded px-3 py-2 text-white cursor-pointer mt-2">
                            <option value="new" ${inquiry.status === 'new' ? 'selected' : ''}>New</option>
                            <option value="in_progress" ${inquiry.status === 'in_progress' ? 'selected' : ''}>In Progress</option>
                            <option value="completed" ${inquiry.status === 'completed' ? 'selected' : ''}>Completed</option>
                        </select>
                    </div>
                </div>
            `;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        // Close modal
        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        // Update inquiry status
        async function updateStatus(id, status) {
            try {
                const completeDate = status === 'completed' ? new Date().toISOString() : null;
                const { error } = await supabaseClient
                    .from('client_inquiries')
                    .update({ status: status, complete_date: completeDate })
                    .eq('id', id);

                if (error) throw error;

                const inquiry = allInquiries.find(i => i.id === id);
                if (inquiry) {
                    inquiry.status = status;
                    inquiry.complete_date = completeDate;
                }
                updateStats();
                filterInquiries();
            } catch (error) {
                console.error('Error updating status:', error);
                alert('Error updating status');
            }
        }

        // Delete inquiry
        async function deleteInquiry(id) {
            if (!confirm('Are you sure you want to delete this inquiry?')) return;

            try {
                const { error } = await supabaseClient
                    .from('client_inquiries')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                allInquiries = allInquiries.filter(i => i.id !== id);
                updateStats();
                filterInquiries();
                alert('Inquiry deleted successfully');
            } catch (error) {
                console.error('Error deleting inquiry:', error);
                alert('Error deleting inquiry');
            }
        }

        // Close modal when clicking outside
        document.getElementById('detailModal')?.addEventListener('click', (e) => {
            if (e.target.id === 'detailModal') closeModal();
        });

        // Initialize on page load
        function initializeApp() {
            console.log('Initializing admin panel...');
            attachLoginHandler();
            attachLogoutHandler();
            checkLoginStatus();
            console.log('Admin panel initialized');
        }

        // Wait for DOM and libraries to load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
        } else {
            initializeApp();
        }
    </script>
</body>

</html>
